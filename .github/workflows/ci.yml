name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # the action reports its findings as a check run
      issues: write # and opens an issue on the weekly cron run
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Both advisories are quick-xml 0.39.4, which reaches us only through
          # wayland-scanner: a proc-macro that parses the protocol XML shipped
          # inside the crate at build time. It never sees untrusted input and
          # never ends up in a released binary. wayland-scanner requires
          # quick-xml "0.39", so 0.41 is unreachable until upstream bumps it.
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195
